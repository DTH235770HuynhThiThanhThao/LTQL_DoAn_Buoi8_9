<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thông Tin Phần Mềm</title>
    <style>
        body {
            background-color: #fff5f7; /* Nền hồng nhạt */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .about-card {
            background: white;
            width: 450px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(255, 182, 193, 0.6);
            text-align: center;
            border: 2px solid #ffb6c1;
        }
        .logo-container img {
            width: 120px; /* Điều chỉnh kích thước logo */
            height: 120px;
            border-radius: 50%;
            border: 3px solid #ff8da1;
            padding: 5px;
            object-fit: cover;
        }
        h2 {
            color: #d81b60;
            margin: 15px 0 5px 0;
            text-transform: uppercase;
            font-size: 1.4em;
        }
        .version {
            color: #ff4081;
            font-size: 0.9em;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .info-table {
            width: 100%;
            margin-top: 20px;
            border-collapse: collapse;
            text-align: left;
        }
        .info-table td {
            padding: 8px 5px;
            border-bottom: 1px dashed #ffd1dc;
            color: #555;
        }
        .label {
            font-weight: bold;
            color: #ad1457;
            width: 40%;
        }
        .footer-text {
            margin-top: 25px;
            font-size: 0.85em;
            color: #b1b1b1;
            font-style: italic;
        }
        .flower-icon {
            color: #ff8da1;
            font-size: 20px;
        }
    </style>
</head>
<body>

<div class="about-card">
    <div class="logo-container">
        <img src="images.jpg" alt="Logo Tiệm Hoa">
    </div>
    
    <h2>QUẢN LÝ TIỆM HOA TƯƠI</h2>
    <div class="version">Phiên bản 1.0.0</div>

    <table class="info-table">
        <tr>
            <td class="label">🌸 Sinh viên thực hiện:</td>
            <td>Huỳnh Thị Thanh Thảo</td>
        </tr>
        <tr>
            <td class="label">🌸 Mã sinh viên:</td>
            <td>DTH235770</td>
        </tr>
        <tr>
            <td class="label">🌸 Lớp:</td>
            <td>DH24TH3</td>
        </tr>
        <tr>
            <td class="label">🌸 GV hướng dẫn:</td>
            <td>TS.Huỳnh Lý Thanh Nhàn</td>
        </tr>
        <tr>
            <td class="label">🌸 Đồ án môn học:</td>
            <td>Lập trình quản lý</td>
        </tr>
    </table>

    <div class="footer-text">
        © 2026 Crafted with ❤️ for Flower Shop Management
    </div>
</div>

</body>
</html>
